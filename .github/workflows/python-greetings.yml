name: Python Greetings Pipeline

on:
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        shell: cmd
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install Python dependencies
        shell: cmd
        working-directory: python-greetings
        run: venv\Scripts\python.exe -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        shell: cmd
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install Python dependencies
        shell: cmd
        working-directory: python-greetings
        run: venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Stop old PM2 process if it exists
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-dev & set "errorlevel=0"

      - name: Start application with PM2
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-dev --interpreter venv\Scripts\python.exe -- --port 7001

      - name: Show PM2 list
        shell: cmd
        run: pm2 list

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone API test repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install Node dependencies
        shell: cmd
        working-directory: course-js-api-framework
        run: npm install

      - name: Run greetings tests on dev
        shell: cmd
        working-directory: course-js-api-framework
        run: npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        shell: cmd
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install Python dependencies
        shell: cmd
        working-directory: python-greetings
        run: venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Stop old PM2 process if it exists
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-stg & set "errorlevel=0"

      - name: Start application with PM2
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-stg --interpreter venv\Scripts\python.exe -- --port 7002

      - name: Show PM2 list
        shell: cmd
        run: pm2 list

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone API test repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install Node dependencies
        shell: cmd
        working-directory: course-js-api-framework
        run: npm install

      - name: Run greetings tests on stg
        shell: cmd
        working-directory: course-js-api-framework
        run: npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        shell: cmd
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install Python dependencies
        shell: cmd
        working-directory: python-greetings
        run: venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Stop old PM2 process if it exists
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-preprod & set "errorlevel=0"

      - name: Start application with PM2
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-preprod --interpreter venv\Scripts\python.exe -- --port 7003

      - name: Show PM2 list
        shell: cmd
        run: pm2 list

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone API test repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install Node dependencies
        shell: cmd
        working-directory: course-js-api-framework
        run: npm install

      - name: Run greetings tests on preprod
        shell: cmd
        working-directory: course-js-api-framework
        run: npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        shell: cmd
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install Python dependencies
        shell: cmd
        working-directory: python-greetings
        run: venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Stop old PM2 process if it exists
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-prod & set "errorlevel=0"

      - name: Start application with PM2
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-prod --interpreter venv\Scripts\python.exe -- --port 7004

      - name: Show PM2 list
        shell: cmd
        run: pm2 list

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Clone API test repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install Node dependencies
        shell: cmd
        working-directory: course-js-api-framework
        run: npm install

      - name: Run greetings tests on prod
        shell: cmd
        working-directory: course-js-api-framework
        run: npm run greetings greetings_prod
