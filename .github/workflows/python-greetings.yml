name: Python Greetings Pipeline

on:
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Install pip dependencies
        uses: ./.github/actions/install-pip-deps

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in deploy-to-dev
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          environment: dev
          port: "7001"

      - name: Check PM2 after deploy-to-dev
        shell: cmd
        run: pm2 list

      - name: Verify dev endpoint after deploy
        shell: cmd
        run: curl http://127.0.0.1:7001/greetings

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in tests-on-dev
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Check PM2 in tests-on-dev
        shell: cmd
        run: pm2 list

      - name: Verify dev endpoint before tests
        shell: cmd
        run: curl http://127.0.0.1:7001/greetings

      - name: Run tests on dev
        uses: ./.github/actions/test
        with:
          environment: dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in deploy-to-stg
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Deploy to stg
        uses: ./.github/actions/deploy
        with:
          environment: stg
          port: "7002"

      - name: Check PM2 after deploy-to-stg
        shell: cmd
        run: pm2 list

      - name: Verify stg endpoint after deploy
        shell: cmd
        run: curl http://127.0.0.1:7002/greetings

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in tests-on-stg
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Check PM2 in tests-on-stg
        shell: cmd
        run: pm2 list

      - name: Verify stg endpoint before tests
        shell: cmd
        run: curl http://127.0.0.1:7002/greetings

      - name: Run tests on stg
        uses: ./.github/actions/test
        with:
          environment: stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in deploy-to-preprod
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Deploy to preprod
        uses: ./.github/actions/deploy
        with:
          environment: preprod
          port: "7003"

      - name: Check PM2 after deploy-to-preprod
        shell: cmd
        run: pm2 list

      - name: Verify preprod endpoint after deploy
        shell: cmd
        run: curl http://127.0.0.1:7003/greetings

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in tests-on-preprod
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Check PM2 in tests-on-preprod
        shell: cmd
        run: pm2 list

      - name: Verify preprod endpoint before tests
        shell: cmd
        run: curl http://127.0.0.1:7003/greetings

      - name: Run tests on preprod
        uses: ./.github/actions/test
        with:
          environment: preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in deploy-to-prod
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Deploy to prod
        uses: ./.github/actions/deploy
        with:
          environment: prod
          port: "7004"

      - name: Check PM2 after deploy-to-prod
        shell: cmd
        run: pm2 list

      - name: Verify prod endpoint after deploy
        shell: cmd
        run: curl http://127.0.0.1:7004/greetings

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Show runner identity in tests-on-prod
        shell: cmd
        run: |
          echo COMPUTERNAME=%COMPUTERNAME%
          hostname
          whoami

      - name: Check PM2 in tests-on-prod
        shell: cmd
        run: pm2 list

      - name: Verify prod endpoint before tests
        shell: cmd
        run: curl http://127.0.0.1:7004/greetings

      - name: Run tests on prod
        uses: ./.github/actions/test
        with:
          environment: prod
