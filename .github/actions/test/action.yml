name: test
description: Run API tests for a target environment

inputs:
  environment:
    description: Environment name (dev, stg, preprod, prod)
    required: true

runs:
  using: composite
  steps:
    - name: Checkout pipeline repository
      uses: actions/checkout@v6

    - name: Print stage info
      shell: cmd
      run: echo Running tests on ${{ inputs.environment }} environment...

    - name: Prepare API test repository
      shell: cmd
      run: |
        if exist C:\deployments\course-js-api-framework rmdir /s /q C:\deployments\course-js-api-framework
        git clone https://github.com/mtararujs/course-js-api-framework.git C:\deployments\course-js-api-framework

    - name: Install Node dependencies
      shell: cmd
      working-directory: C:\deployments\course-js-api-framework
      run: npm install

    - name: Verify endpoint before tests
      shell: powershell
      run: |
        switch ("${{ inputs.environment }}") {
          "dev"     { $port = 7001 }
          "stg"     { $port = 7002 }
          "preprod" { $port = 7003 }
          "prod"    { $port = 7004 }
          default   { throw "Unknown environment: ${{ inputs.environment }}" }
        }
        curl.exe "http://127.0.0.1:$port/greetings"

    - name: Run greetings tests
      shell: cmd
      working-directory: C:\deployments\course-js-api-framework
      run: npm run greetings greetings_${{ inputs.environment }}
