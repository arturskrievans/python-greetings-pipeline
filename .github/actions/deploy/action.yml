name: deploy
description: Deploy python-greetings to a target environment with PM2

inputs:
  environment:
    description: Environment name (dev, stg, preprod, prod)
    required: true
  port:
    description: Port number
    required: true

runs:
  using: composite
  steps:
    - name: Print stage info
      shell: cmd
      run: echo Deploying to ${{ inputs.environment }} environment on port ${{ inputs.port }}...

    - name: Clone python-greetings repository
      uses: actions/checkout@v4
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Create virtual environment
      shell: cmd
      working-directory: python-greetings
      run: python -m venv venv

    - name: Install Python dependencies
      shell: cmd
      working-directory: python-greetings
      run: venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop old PM2 process if exists
      shell: cmd
      run: pm2 delete greetings-app-${{ inputs.environment }} || echo Process not found

    - name: Start application with PM2
      shell: cmd
      working-directory: python-greetings
      run: pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter venv\Scripts\python.exe -- --port ${{ inputs.port }}

    - name: Show PM2 status
      shell: cmd
      run: pm2 list

    - name: Wait for application to start
      shell: cmd
      run: ping 127.0.0.1 -n 10 > nul

    - name: Show recent logs (for debugging)
      shell: cmd
      run: pm2 logs greetings-app-${{ inputs.environment }} --lines 20 --nostream
