name: deploy
description: Deploy python-greetings to a target environment with PM2

inputs:
  environment:
    description: Environment name (dev, stg, preprod, prod)
    required: true
  port:
    description: Port number
    required: true

runs:
  using: composite
  steps:
    - name: Checkout pipeline repository
      uses: actions/checkout@v4

    - name: Print stage info
      shell: cmd
      run: echo Deploying to ${{ inputs.environment }} environment on port ${{ inputs.port }}...

    - name: Disable runner process tracking for PM2
      shell: cmd
      run: echo RUNNER_TRACKING_ID=>> %GITHUB_ENV%

    - name: Stop old PM2 process if it exists
      shell: cmd
      continue-on-error: true
      run: pm2 delete greetings-app-${{ inputs.environment }}

    - name: Prepare deployment folder
      shell: cmd
      run: |
        if exist C:\deployments\python-greetings-${{ inputs.environment }} rmdir /s /q C:\deployments\python-greetings-${{ inputs.environment }}
        git clone https://github.com/mtararujs/python-greetings.git C:\deployments\python-greetings-${{ inputs.environment }}

    - name: Create virtual environment
      shell: cmd
      working-directory: C:\deployments\python-greetings-${{ inputs.environment }}
      run: python -m venv venv

    - name: Install Python dependencies
      shell: cmd
      working-directory: C:\deployments\python-greetings-${{ inputs.environment }}
      run: venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Start application with PM2
      shell: cmd
      run: pm2 start "C:\deployments\python-greetings-${{ inputs.environment }}\venv\Scripts\python.exe" --name greetings-app-${{ inputs.environment }} -- "C:\deployments\python-greetings-${{ inputs.environment }}\app.py" --port ${{ inputs.port }}

    - name: Wait for app to start
      shell: cmd
      run: ping 127.0.0.1 -n 10 > nul

    - name: Show PM2 list
      shell: cmd
      run: pm2 list

    - name: Verify endpoint locally
      shell: cmd
      run: curl http://127.0.0.1:${{ inputs.port }}/greetings
